<head>
    <!-- Basic Page Needs
    –––––––––––––––––––––––––––––––––––––––––––––––––– -->
    <meta charset="utf-8">
    <title>Dynamic UI v0.0</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/dynamic_iu_0.css">
    <script type="text/javascript" src="js/dynamic_ui.js"></script>
</head>
<body>
    <div id="main">
        <div id="wrapper-ui">
            <div id="wrapper-buttons">
                <button>Yo</button>
                <div class="attr">
                    <select class="alternate">
                        <option value="valeur1">Valeur 1</option>
                        <option value="valeur2" selected>Valeur 2</option>
                        <option value="valeur3">Valeur 3</option>
                    </select>
                    <div class="attributes">
                        <div class="slider-field">
                            <div class="name">Slider :</div>
                            <input class="num-disp" type="number">
                            <input class="slider" name="slider" type="range" min="0" max="11" value="7" step="1">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
