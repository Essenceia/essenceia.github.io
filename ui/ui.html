<head>
    <meta charset="utf-8">
    <title>Dynamic UI v0.1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../css/koralion/colors.css">
    <link rel="stylesheet" href="../css/koralion/margin.css">
    <link rel="stylesheet" href="../css/koralion/ui.css">
    <script type="text/javascript" src="../js/koralion/define.js"></script>
    <script type="text/javascript" src="../js/koralion/dynamic_ui.js"></script>
</head>
<body>
    <div class="ui">
        <div class="ui-header grid-column">
            <div class="menu" id="file">File</div>
            <div class="menu" id="edit">Edit</div>
            <div class="menu" id="view">View</div>
        </div>
        <div class="ui-common-tools"></div>
        <div class="ui-access-bar"></div>
        <div class="ui-canvas"></div>
        <div class="ui-function-menu">
            <div class="resize_contrainer">
                <div class="handle">&#65087;</div>
                <div class="handle_buffer"></div>
            </div>
            <div class="header" name=""> Function menu</div>
            <!-- category menu -->
            <div class="cateogry toolbar">
                <div class="flex-collumn">
                <!-- directory -->
                <svg id="dir" fill="var(--svgcolor)" xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24"><path d="M0 0h24v24H0z" fill="none"/><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
                <!-- create new category -->
                <svg  id="new_dir" fill="var(--svgcolor)"  xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M20 6h-8l-2-2H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-1 8h-3v3h-2v-3h-3v-2h3V9h2v3h3v2z"/></svg>
                <!-- add category -->
                <svg  id="new" fill="var(--svgcolor)" xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24"><path d="M0 0h24v24H0z" fill="none"/><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </div>
            </div>
            <div class="cateogry list" >
                <div class="category-item">Bridge</div>
                <div class="category-item">Room</div>
                <div class="category-item">Door</div>
                <div class="category-item">Bridge</div>
                <div class="category-item">Room</div>
                <div class="category-item">Door</div>
            </div>
            
            <!-- function menu -->
            <div class="function toolbar" data-category="bridge" >
                <svg id="filter" fill="var(--svgcolor)" xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24"><path d="M0 0h24v24H0z" fill="none"/><path id="reload" fill="var(--svgcolor)" d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/></svg>
                <div class="category-current">Bridge</div>
                <div class="search"></div>
                <svg id="redo" fill="var(--svgcolor)" xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24"><path d="M0 0h24v24H0z" fill="none"/><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
                
            </div>
            <div class="function list"></div>
            
        </div>
        <div class="ui-arg-menu" >
            
            <div class="header" name="">Function</div>
            <div class="args" data-category="bridge" data-function="effeil">
            </div>
            <div class="resize_contrainer">
                <div class="handle">&#9001;</div>
                <div class="handle_buffer"></div>
            </div>
            
        </div>
        <div class="ui-footer"></div>
    </div>
</body>
